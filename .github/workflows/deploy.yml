name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site (TanStack Start prerender)
        run: bun run build
        env:
          GH_PAGES: "1"
          VITE_GH_PAGES: "1"
          # Project pages are served at https://<user>.github.io/<repo>/, so
          # assets must be loaded from that subpath. Derive from the repo name.
          BASE_PATH: "/${{ github.event.repository.name }}/"
          # Optional: set SITE_URL in repo Variables to populate sitemap absolute URLs.
          SITE_URL: ${{ vars.SITE_URL }}

      - name: Download Lovable Assets into static output
        run: node scripts/download-assets.mjs

      - name: Add GitHub Pages SPA fallback + .nojekyll
        run: |
          cp dist/client/index.html dist/client/404.html
          touch dist/client/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
